{% extends "base.html" %}
{% block title %}🔢 2048 – DevLog{% endblock %}

{% block content %}
<div style="max-width:480px;margin:0 auto;">
  <div class="page-header" style="margin-bottom:1rem;">
    <h1>🔢 2048</h1>
    <a href="{{ url_for('games.index') }}" class="btn btn-secondary">← Games</a>
  </div>

  <!-- Scores + controls -->
  <div class="g-header">
    <div class="g-scores">
      <div class="g-score">
        <span>SCORE</span>
        <strong id="score">0</strong>
      </div>
      <div class="g-score">
        <span>🏆 BEST</span>
        <strong id="best">0</strong>
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-primary" onclick="newGame()">New Game</button>
      <button class="btn btn-secondary" onclick="undo()">↩ Undo</button>
    </div>
  </div>

  <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.75rem;text-align:center;">
    Arrow keys / WASD · Swipe on mobile · Reach <strong>2048</strong> to win! 🏆
  </p>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board-bg">
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
    </div>
    <div class="tile-layer" id="tile-layer"></div>
    <div class="board-overlay" id="board-overlay" style="display:none;">
      <div class="overlay-content">
        <div id="ov-icon">🎉</div>
        <h2 id="ov-title">You Win!</h2>
        <p id="ov-msg"></p>
        <button class="btn btn-primary" onclick="newGame()">Play Again</button>
      </div>
    </div>
  </div>
</div>

<style>
/* Scores header */
.g-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.g-scores { display:flex; gap:0.5rem; }
.g-score {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.4rem 1rem;
  text-align: center;
  backdrop-filter: blur(8px);
  min-width: 80px;
}
.g-score span {
  display:block;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:.5px;
  color:var(--text-muted);
}
.g-score strong {
  display:block;
  font-size:1.4rem;
  font-weight:800;
  background:var(--gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Board */
.board-wrap {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #1e1b4b;
  padding: 10px;
  touch-action: none;
  user-select: none;
}
.board-bg, .tile-layer {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.tile-layer { position:absolute; inset:10px; }
.grid-cell {
  aspect-ratio: 1;
  background: rgba(255,255,255,.06);
  border-radius: 10px;
}

/* Tiles */
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  border-radius: 10px;
  transition: top .12s ease, left .12s ease;
  animation: pop .15s ease;
}
@keyframes pop {
  0%   { transform: scale(.85); }
  60%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes merge-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.tile.merged { animation: merge-pop .2s ease; }

/* Tile colors */
.t2    { background:#ede0f7; color:#3b0764; }
.t4    { background:#ddd6fe; color:#4c1d95; }
.t8    { background:#c4b5fd; color:#fff; }
.t16   { background:#a78bfa; color:#fff; }
.t32   { background:#8b5cf6; color:#fff; }
.t64   { background:#7c3aed; color:#fff; }
.t128  { background:linear-gradient(135deg,#7c3aed,#ec4899); color:#fff; }
.t256  { background:linear-gradient(135deg,#6366f1,#ec4899); color:#fff; }
.t512  { background:linear-gradient(135deg,#6366f1,#f472b6); color:#fff; }
.t1024 { background:linear-gradient(135deg,#4f46e5,#db2777); color:#fff; }
.t2048 { background:linear-gradient(135deg,#4338ca,#be185d); color:#fff;
         box-shadow:0 0 32px rgba(236,72,153,.6); }
.t-big { background:linear-gradient(135deg,#1d4ed8,#9333ea); color:#fff; }

/* Overlay */
.board-overlay {
  position:absolute;
  inset:0;
  background:rgba(15,10,40,.88);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:var(--radius-lg);
}
.board-overlay .overlay-content {
  text-align:center;
  color:#e0e7ff;
}
.board-overlay .overlay-content > div { font-size:3rem; margin-bottom:0.5rem; }
.board-overlay h2 { font-size:1.75rem; font-weight:800; margin-bottom:0.5rem; }
.board-overlay p { color:#a5b4fc; margin-bottom:1.25rem; font-size:0.9rem; }
</style>

<script>
const SIZE = 4;
let board, prev, score, best, scoreEl, bestEl, tileLayer, boardWrap, won;

scoreEl   = document.getElementById('score');
bestEl    = document.getElementById('best');
tileLayer = document.getElementById('tile-layer');
boardWrap = document.querySelector('.board-wrap');

best = parseInt(localStorage.getItem('2048-best') || '0');
bestEl.textContent = best;

function newGame() {
  board = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  prev  = null;
  score = 0;
  won   = false;
  addTile(); addTile();
  hideOverlay();
  render();
}

function undo() {
  if (!prev) return;
  board = prev.board;
  score = prev.score;
  prev  = null;
  updateScores();
  render();
}

function addTile() {
  const empty = [];
  board.forEach((row,r) => row.forEach((v,c) => { if(!v) empty.push([r,c]); }));
  if (!empty.length) return;
  const [r,c] = empty[~~(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(x=>x), merged=false;
  for (let i=0; i<arr.length-1; i++) {
    if (arr[i]===arr[i+1] && !merged) {
      arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); merged=true;
      if (arr[i]===2048 && !won) { won=true; setTimeout(showWin,300); }
    } else merged=false;
  }
  while(arr.length<SIZE) arr.push(0);
  return arr;
}

function move(dir) {
  prev = { board: board.map(r=>[...r]), score };
  const b0 = board.map(r=>[...r]);

  if (dir==='l') board = board.map(r=>slide(r));
  else if (dir==='r') board = board.map(r=>slide([...r].reverse()).reverse());
  else if (dir==='u') {
    for(let c=0;c<SIZE;c++){const col=board.map(r=>r[c]);const s=slide(col);board.forEach((r,i)=>r[c]=s[i]);}
  } else {
    for(let c=0;c<SIZE;c++){const col=board.map(r=>r[c]).reverse();const s=slide(col).reverse();board.forEach((r,i)=>r[c]=s[i]);}
  }

  const changed = board.some((row,r)=>row.some((v,c)=>v!==b0[r][c]));
  if (changed) {
    addTile();
    if (score>best) { best=score; localStorage.setItem('2048-best',best); }
    updateScores();
    render();
    if (!won && isOver()) setTimeout(showOver, 300);
  } else {
    prev = null;
  }
}

function isOver() {
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(!board[r][c]) return false;
    if(c<SIZE-1 && board[r][c]===board[r][c+1]) return false;
    if(r<SIZE-1 && board[r][c]===board[r+1][c]) return false;
  }
  return true;
}

function updateScores() {
  scoreEl.textContent = score;
  bestEl.textContent  = best;
}

/* ---- Rendering ---- */
function render() {
  // compute cell size from DOM
  const bw   = boardWrap.clientWidth - 20;
  const cell = (bw - 3*10) / 4;

  tileLayer.innerHTML = '';
  board.forEach((row,r) => row.forEach((val,c) => {
    if (!val) return;
    const tile = document.createElement('div');
    const cls  = val<=2048 ? `t${val}` : 't-big';
    tile.className = `tile ${cls}`;
    tile.style.cssText = `
      width:${cell}px; height:${cell}px;
      top:${r*(cell+10)}px; left:${c*(cell+10)}px;
      font-size:${val>=1024 ? cell*.28 : val>=128 ? cell*.34 : cell*.42}px;
    `;
    tile.textContent = val;
    tileLayer.appendChild(tile);
  }));
}

function showWin() {
  document.getElementById('ov-icon').textContent  = '🏆';
  document.getElementById('ov-title').textContent = 'You Win!';
  document.getElementById('ov-msg').textContent   = `Score: ${score}`;
  document.getElementById('board-overlay').style.display='flex';
}
function showOver() {
  document.getElementById('ov-icon').textContent  = '😢';
  document.getElementById('ov-title').textContent = 'Game Over';
  document.getElementById('ov-msg').textContent   = `Final Score: ${score}`;
  document.getElementById('board-overlay').style.display='flex';
}
function hideOverlay() { document.getElementById('board-overlay').style.display='none'; }

/* ---- Input ---- */
document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d',a:'l',d:'r',w:'u',s:'d'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let ts2=null;
boardWrap.addEventListener('touchstart',e=>{ts2={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
boardWrap.addEventListener('touchend',e=>{
  if(!ts2)return;
  const dx=e.changedTouches[0].clientX-ts2.x, dy=e.changedTouches[0].clientY-ts2.y;
  if(Math.abs(dx)<8&&Math.abs(dy)<8){ts2=null;return;}
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'r':'l');
  else move(dy>0?'d':'u');
  ts2=null;e.preventDefault();
},{passive:false});

/* responsive redraw */
window.addEventListener('resize', render);

newGame();
</script>
{% endblock %}
