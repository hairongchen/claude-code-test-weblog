{% extends "base.html" %}
{% block title %}🐍 Snake – DevLog{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <div class="page-header" style="margin-bottom:1rem;">
    <h1>🐍 Snake</h1>
    <a href="{{ url_for('games.index') }}" class="btn btn-secondary">← Games</a>
  </div>

  <!-- Scoreboard -->
  <div class="snake-scores">
    <div class="score-box">
      <span class="score-label">Score</span>
      <span class="score-val" id="score">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">🏆 Best</span>
      <span class="score-val" id="highscore">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Level</span>
      <span class="score-val" id="level">1</span>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-content">
        <div class="overlay-icon">🐍</div>
        <h2 id="overlay-title">Snake</h2>
        <p id="overlay-msg">Use Arrow keys / WASD<br>Swipe on mobile</p>
        <button class="btn btn-primary" id="start-btn" onclick="startGame()">▶ Start Game</button>
      </div>
    </div>
  </div>

  <!-- Mobile controls -->
  <div class="dpad">
    <div></div>
    <button class="dpad-btn" onclick="setDir(0,-1)">▲</button>
    <div></div>
    <button class="dpad-btn" onclick="setDir(-1,0)">◀</button>
    <button class="dpad-btn" onclick="startGame()" id="dpad-center">⟳</button>
    <button class="dpad-btn" onclick="setDir(1,0)">▶</button>
    <div></div>
    <button class="dpad-btn" onclick="setDir(0,1)">▼</button>
    <div></div>
  </div>
</div>

<style>
.snake-scores {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.score-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.6rem 1rem;
  text-align: center;
  backdrop-filter: blur(8px);
}
.score-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .4px;
  color: var(--text-muted);
  margin-bottom: 0.2rem;
}
.score-val {
  display: block;
  font-size: 1.5rem;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.canvas-wrap {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
#canvas { display: block; width: 100%; image-rendering: pixelated; }

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(15,10,40,.85);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay.hidden { display: none; }
.overlay-content { text-align: center; color: #e0e7ff; }
.overlay-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
.overlay-content h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
.overlay-content p { color: #a5b4fc; margin-bottom: 1.25rem; line-height: 1.6; font-size: 0.9rem; }

/* D-pad */
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 4px;
  margin: 1rem auto 0;
  width: fit-content;
}
.dpad-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.1rem;
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  backdrop-filter: blur(8px);
  -webkit-tap-highlight-color: transparent;
}
.dpad-btn:active {
  background: var(--gradient);
  color: #fff;
  border-color: transparent;
  transform: scale(.92);
}
</style>

<script>
const GRID = 20, CELL = 24;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width = canvas.height = GRID * CELL;

let snake, dir, nextDir, food, particles, score, highScore, level, loop, state;

const C = {
  bg:    '#0f0a28',
  grid:  'rgba(255,255,255,.03)',
  head:  '#a855f7',
  body1: '#6366f1',
  body2: '#818cf8',
  food:  '#ec4899',
  glow:  'rgba(236,72,153,.6)',
};

highScore = parseInt(localStorage.getItem('snake-hs') || '0');
document.getElementById('highscore').textContent = highScore;
state = 'idle';

function startGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  food = spawnFood();
  particles = [];
  score = 0;
  level = 1;
  state = 'playing';
  updateUI();
  document.getElementById('overlay').classList.add('hidden');
  if (loop) clearInterval(loop);
  loop = setInterval(tick, 130);
}

function spawnFood() {
  let p;
  do { p = {x: ~~(Math.random()*GRID), y: ~~(Math.random()*GRID)}; }
  while (snake.some(s => s.x===p.x && s.y===p.y));
  return p;
}

function setDir(x, y) {
  if (state !== 'playing') { startGame(); return; }
  if (!(x===-dir.x && y===-dir.y)) nextDir = {x,y};
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    endGame(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    spawnParticles(food.x*CELL+CELL/2, food.y*CELL+CELL/2);
    food = spawnFood();
    if (score % 5 === 0) {
      level = Math.min(10, ~~(score/5)+1);
      clearInterval(loop);
      loop = setInterval(tick, Math.max(55, 130 - (level-1)*12));
    }
    updateUI();
  } else {
    snake.pop();
  }
  draw();
}

function spawnParticles(x, y) {
  for (let i=0; i<8; i++) {
    const angle = (i/8)*Math.PI*2;
    particles.push({x, y, vx: Math.cos(angle)*3, vy: Math.sin(angle)*3, life: 1});
  }
}

function draw() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  for (let i=0;i<=GRID;i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = C.food;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2); ctx.fill();
    p.x += p.vx; p.y += p.vy; p.vx *= .88; p.vy *= .88; p.life -= 0.08;
  });
  ctx.globalAlpha = 1;

  // Food glow
  ctx.shadowColor = C.glow;
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = C.food;
  const t = Date.now()/400;
  const pulse = 1 + 0.08*Math.sin(t);
  const r = (CELL/2 - 2)*pulse;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const frac = i/snake.length;
    ctx.globalAlpha = Math.max(0.35, 1 - frac*0.55);
    ctx.fillStyle = i===0 ? C.head : (i%2===0 ? C.body1 : C.body2);
    if (i===0) { ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 12; }
    const pad = i===0 ? 1 : 2, rad = i===0 ? 7 : 4;
    rrect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, rad);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function endGame() {
  state = 'over';
  clearInterval(loop);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snake-hs', highScore);
  }
  // Draw final frame with overlay
  draw();
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = score>=highScore && score>0 ? '🏆 New Best!' : '💀 Game Over';
  document.getElementById('overlay-msg').textContent = `Score: ${score}  ·  Best: ${highScore}`;
  document.getElementById('start-btn').textContent = '↺ Play Again';
  ov.classList.remove('hidden');
  document.getElementById('highscore').textContent = highScore;
}

function updateUI() {
  document.getElementById('score').textContent     = score;
  document.getElementById('highscore').textContent = highScore;
  document.getElementById('level').textContent     = level;
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  };
  if (e.key===' ') { e.preventDefault(); if(state!=='playing') startGame(); return; }
  const d = map[e.key];
  if (d) { e.preventDefault(); setDir(d.x, d.y); }
});

// Touch swipe
let ts = null;
canvas.addEventListener('touchstart', e => { ts={x:e.touches[0].clientX,y:e.touches[0].clientY}; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend', e => {
  if(!ts) return;
  const dx=e.changedTouches[0].clientX-ts.x, dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) { if(state!=='playing') startGame(); ts=null; return; }
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
  ts=null; e.preventDefault();
},{passive:false});

// Initial idle draw
ctx.fillStyle=C.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
{% endblock %}
