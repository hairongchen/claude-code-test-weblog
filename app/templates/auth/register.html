{% extends "base.html" %}
{% block title %}Register – DevLog{% endblock %}

{% block content %}
<div class="form-card">
  <h1>Create account</h1>
  <p class="form-subtitle">Join the community</p>

  <form method="post" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             value="{{ username|default('') }}"
             placeholder="yourname"
             required autofocus>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             value="{{ email|default('') }}"
             placeholder="you@example.com"
             required>
    </div>
    <div class="form-group">
      <label for="password">Password <span class="hint">(min 6 chars)</span></label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" required minlength="6">
    </div>
    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm"
             placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
      Create account →
    </button>
  </form>

  <p class="form-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
